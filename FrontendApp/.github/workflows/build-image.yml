name: Build image

on:
  push:
    branches: ["main", "release/Prod"]

env:
  PROJECT: "NiveshUi"
  BASE_PROJECT: "projectx"
  DOCKER_IMAGE_NAME: "nivesh-ui"
  IMAGE_TAG: ${{ github.sha }}
  # VITE_* are baked into the static bundle at build time (they are public).
  VITE_API_BASE_URL: "/api/v1"
  VITE_APP_NAME: "Nivesh"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Quality gate (the Node analogue of `mvn package`): fail fast before we
      # spend time building/pushing an image.
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Set up Docker Buildx (BuildKit with caching)
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_LOGIN_SERVER }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image with cache
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_APP_NAME=${{ env.VITE_APP_NAME }}
          tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:cache,mode=max

      - name: Log in to Shared Docker registry
        if: github.ref == 'refs/heads/release/Prod'
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.SHARED_REPO_LOGIN_SERVER }}
          username: ${{ secrets.SHARED_REPO_USER }}
          password: ${{ secrets.SHARED_REPO_PASS }}

      - name: Build and push Docker image with cache to sharedrepo
        if: github.ref == 'refs/heads/release/Prod'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
            VITE_APP_NAME=${{ env.VITE_APP_NAME }}
          tags: ${{ secrets.SHARED_REPO_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=registry,ref=${{ secrets.SHARED_REPO_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:cache
          cache-to: type=registry,ref=${{ secrets.SHARED_REPO_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:cache,mode=max

  publish-qa:
    if: ${{ github.ref == 'refs/heads/main' }}
    needs: "build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GIT_CLASSIC_TOKEN }}

      - name: update qa tag
        working-directory: ${{ env.BASE_PROJECT }}/${{ env.PROJECT }}/qa
        run: kustomize edit set image ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: "Push Updated Image Tag"
        run: |
          git config --global user.name "@git-actions"
          git config --global user.email "git-actions@lucy.ai"
          git commit -am "[Automated] Updated frontend image tag to ${{ env.IMAGE_TAG }}"
          git push

  publish-prod:
    if: ${{ github.ref == 'refs/heads/release/Prod' }}
    needs: "build"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ vars.GITOPS_REPO }}
          token: ${{ secrets.GIT_CLASSIC_TOKEN }}

      - name: update prod tag
        working-directory: ${{ env.BASE_PROJECT }}/${{ env.PROJECT }}/prod
        run: kustomize edit set image ${{ secrets.REGISTRY_LOGIN_SERVER }}/${{ env.DOCKER_IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: "Push Updated Image Tag"
        run: |
          git config --global user.name "@git-actions"
          git config --global user.email "git-actions@lucy.ai"
          git commit -am "[Automated] Updated frontend image tag to ${{ env.IMAGE_TAG }}"
          git push
