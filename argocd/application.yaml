# GitOps deployment of the app via Argo CD.
#
# This is OPTIONAL. The up script deploys the app directly with Helm so the
# stack works out-of-the-box without GitHub. To switch to full GitOps:
#   1. Push this repo to GitHub.
#   2. Edit repoURL below to your repo.
#   3. Set the ECR image + DB values (or commit them into helm/projectx/values.yaml).
#   4. kubectl apply -f argocd/application.yaml
#
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: projectx
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Hiresh98/ProjectX.git
    targetRevision: main
    path: helm/projectx
    helm:
      valueFiles:
        - values.yaml
      # Deploy-time overrides (env-specific values, not committed to values.yaml).
      parameters:
        - name: image.repository
          value: 066113723569.dkr.ecr.ap-south-1.amazonaws.com/projectx/app
        - name: image.tag
          value: latest
        - name: database.host
          value: projectx-dev-pg.c100i2o684uw.ap-south-1.rds.amazonaws.com
        - name: database.existingSecret
          value: projectx-db
  destination:
    server: https://kubernetes.default.svc
    namespace: projectx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
