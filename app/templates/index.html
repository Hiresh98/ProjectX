<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ProjectX · Form</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      margin: 0; min-height: 100vh; display: grid; place-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b); color: #e2e8f0;
    }
    .card {
      width: min(520px, 92vw); background: #111827; border: 1px solid #1f2937;
      border-radius: 16px; padding: 28px 28px 22px; box-shadow: 0 20px 60px rgba(0,0,0,.45);
    }
    h1 { margin: 0 0 4px; font-size: 22px; }
    .sub { margin: 0 0 20px; color: #94a3b8; font-size: 13px; }
    label { display: block; font-size: 13px; margin: 14px 0 6px; color: #cbd5e1; }
    input, textarea {
      width: 100%; padding: 11px 12px; border-radius: 10px; border: 1px solid #334155;
      background: #0b1220; color: #e2e8f0; font-size: 14px;
    }
    textarea { min-height: 90px; resize: vertical; }
    button {
      margin-top: 18px; width: 100%; padding: 12px; border: 0; border-radius: 10px;
      background: #6366f1; color: white; font-size: 15px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #4f46e5; }
    .meta { margin-top: 16px; font-size: 12px; color: #64748b; display: flex; justify-content: space-between; }
    pre { background: #0b1220; border: 1px solid #1f2937; border-radius: 10px; padding: 12px;
      font-size: 12px; overflow:auto; white-space: pre-wrap; word-break: break-word; }
  </style>
</head>
<body>
  <div class="card">
    <h1>ProjectX Form</h1>
    <p class="sub">Sample app for EKS load-testing & autoscaling demo.</p>
    <form id="f">
      <label for="name">Name</label>
      <input id="name" name="name" placeholder="Ada Lovelace" required />
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="ada@example.com" required />
      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Say something..."></textarea>
      <button type="submit">Submit</button>
    </form>
    <pre id="out" hidden></pre>
    <div class="meta">
      <span>v{{ version }}</span>
      <span>pod: {{ host }}</span>
    </div>
  </div>
  <script>
    const f = document.getElementById('f');
    const out = document.getElementById('out');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      const body = Object.fromEntries(new FormData(f).entries());
      const res = await fetch('/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      const json = await res.json();
      out.hidden = false;
      out.textContent = JSON.stringify(json, null, 2);
    });
  </script>
</body>
</html>
