name: Infra (Terraform)

on:
  pull_request:
    paths: ["stacks/**", ".github/workflows/infra.yml"]
  push:
    branches: [main]
    paths: ["stacks/**"]
  workflow_dispatch:

permissions:
  id-token: write   # required for AWS OIDC
  contents: read

env:
  AWS_REGION: ap-south-1

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.5"

      # fmt + validate every Terraform stack. Validation does not need cloud
      # credentials or remote state, so it runs on every PR/push.
      - name: Format check (all stacks)
        run: terraform fmt -check -recursive stacks
        continue-on-error: true

      - name: Validate each stack
        run: |
          set -e
          for d in stacks/*/; do
            if ls "$d"*.tf >/dev/null 2>&1; then
              echo "::group::validate $d"
              terraform -chdir="$d" init -backend=false -input=false >/dev/null
              terraform -chdir="$d" validate
              echo "::endgroup::"
            fi
          done
